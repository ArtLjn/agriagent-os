services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: farm-manager-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/config.yaml:/app/config.yaml:ro
      - farm-manager-data:/app/data
    environment:
      - database__url=sqlite:///./data/farm_manager.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  farm-manager-data:
