<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>账本 · 与系统风格对齐</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* 严格对齐 mobile-app/lib/theme/app_colors.dart */
    --bg:          #F7F9FC;   /* AppColors.background */
    --bg-top:      #FFFFFF;   /* AppColors.backgroundTop */
    --surface:     #FFFFFF;   /* AppColors.surface */
    --surface3:    #F9FBFE;   /* AppColors.surface3 */
    --elevated:    #FCFDFF;   /* AppColors.elevated */

    --ink:         #132238;   /* _LedgerColors.ink */
    --ink2:        #1F2937;   /* AppColors.ink2 */
    --muted:       #6B7280;   /* AppColors.muted */
    --subtle:      #8B95A5;   /* AppColors.subtle */
    --tabMuted:    #667085;   /* AppColors.tabMuted */

    --line:        #E8ECF2;   /* AppColors.line */
    --lineSoft:    #EEF2F6;   /* AppColors.lineSoft */

    --blue:        #2F73F6;   /* AppColors.blue (主色) */
    --blueDark:    #1F5FE8;   /* AppColors.blueDark */
    --blueSoft:    #EEF4FF;   /* AppColors.blueSoft */

    --green:       #35C879;   /* AppColors.green */
    --greenDark:   #16A36A;   /* AppColors.greenDark (收入) */
    --greenSoft:   #EAF9F0;   /* AppColors.greenSoft */

    --amber:       #FF9F1C;   /* AppColors.amber (支出) */
    --amberSoft:   #FFF4E5;   /* AppColors.amberSoft */
    --warmIconBg:  #FFF7EC;   /* billing_screen.dart line 54 */

    --red:         #FF3B30;   /* AppColors.red (负值/赤字) */
    --redSoft:     #FFF0F1;   /* AppColors.redSoft */

    --cyan:        #0EA5B8;
    --cyanSoft:    #E8FBFF;
  }
  html, body { font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
  body { background: #E5E7EB; }
  .tabular { font-variant-numeric: tabular-nums; }

  .device {
    width: 430px;
    min-height: 932px;
    margin: 24px auto;
    background: var(--bg);
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(15, 23, 42, 0.18), 0 8px 24px rgba(15, 23, 42, 0.08);
    position: relative;
  }

  /* 系统真实卡片：白底 + 1px line + 22px radius + 浅阴影 */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 22px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
  }

  /* 系统真实圆形 icon：42px + 白色高光边 + 蓝色微阴影 */
  .round-icon {
    width: 42px;
    height: 42px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.76);
    box-shadow: 0 5px 12px rgba(20, 115, 255, 0.08);
  }

  .spark-fill { fill: url(#sparkGrad); }
  .nav-shadow { box-shadow: 0 -1px 0 var(--line); }

  /* hero 数字描边优化 */
  .hero-number {
    font-feature-settings: "tnum" 1;
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>

<div class="device">
  <!-- iOS Status Bar -->
  <div class="flex items-center justify-between px-8 pt-3 pb-1 text-[15px] font-semibold text-[var(--ink)] tabular">
    <span>9:41</span>
    <div class="flex items-center gap-1.5">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5" opacity="0.4"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 2.5c1.93 0 3.7.7 5.07 1.86l1.43-1.43A9.96 9.96 0 0 0 8 .5C5.05.5 2.36 1.57.4 3.36L1.83 4.8A7.97 7.97 0 0 1 8 2.5z" opacity="0.42"/><path d="M8 6.5c.93 0 1.79.31 2.48.84l1.43-1.43A6.97 6.97 0 0 0 8 4.5c-1.5 0-2.88.47-4.02 1.27l1.43 1.43A4.48 4.48 0 0 1 8 6.5z" opacity="0.7"/><circle cx="8" cy="10" r="1.8"/></svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="1" y="1" width="22" height="10" rx="3" stroke="currentColor" stroke-opacity="0.35" stroke-width="1"/><rect x="3" y="3" width="16" height="6" rx="1.5" fill="currentColor"/><rect x="24" y="4" width="1.5" height="4" rx="0.5" fill="currentColor" fill-opacity="0.35"/></svg>
    </div>
  </div>

  <!-- App Header -->
  <header class="flex items-center justify-between px-5 pt-2 pb-3">
    <div class="flex items-center gap-2.5">
      <!-- 田掌柜 logo: 绿叶 + 文字 -->
      <div class="w-8 h-8 rounded-full flex items-center justify-center" style="background: linear-gradient(135deg, #35C879 0%, #16A36A 100%);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 19c0-7 5-12 14-13-1 9-6 14-13 14M5 19c2-3 5-5 9-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="text-[22px] font-bold tracking-tight text-[var(--ink)] leading-tight">账本</h1>
    </div>
    <div class="flex items-center gap-2">
      <button class="flex items-center gap-1.5 h-8 pl-3 pr-2.5 rounded-full border border-[var(--line)] bg-white text-[13px] font-medium text-[var(--ink)]">
        <span>本年</span>
        <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <!-- ===== Hero 资金概览卡（系统真实结构：白底 + 1px line + 22px radius + 浅阴影） ===== -->
  <section class="px-5 pt-1">
    <div class="section-card p-5">
      <!-- 头部：标题 + 副标题 + 智能复盘入口 -->
      <div class="flex items-start justify-between">
        <div>
          <div class="flex items-center gap-2">
            <h2 class="text-[18px] font-bold text-[var(--ink)]">资金概览</h2>
            <span class="px-2 py-0.5 rounded-full bg-[var(--blueSoft)] text-[11px] font-medium text-[var(--blue)]">本年</span>
          </div>
          <p class="mt-1 text-[12px] text-[var(--muted)]">本年支出结构与待收款状态</p>
        </div>
        <button class="flex items-center gap-1 px-2.5 py-1 rounded-full border border-[var(--lineSoft)] bg-[var(--surface3)] text-[11px] font-medium text-[var(--ink2)]">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <span>智能复盘</span>
        </button>
      </div>

      <!-- Hero 净收益 -->
      <div class="mt-4 flex items-end justify-between">
        <div>
          <p class="text-[12px] text-[var(--muted)] font-medium">年度净收益</p>
          <div class="mt-1 flex items-baseline gap-1.5">
            <span class="hero-number text-[40px] leading-none font-bold tabular text-[var(--red)]">-¥12万</span>
          </div>
        </div>
        <!-- 月度趋势 sparkline -->
        <div class="w-[140px] h-[52px] relative">
          <svg width="140" height="52" viewBox="0 0 140 52" preserveAspectRatio="none">
            <defs>
              <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#FF3B30" stop-opacity="0.18"/>
                <stop offset="100%" stop-color="#FF3B30" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <path d="M0 14 L20 18 L40 12 L60 22 L80 20 L100 30 L120 28 L140 38 L140 52 L0 52 Z" class="spark-fill"/>
            <path d="M0 14 L20 18 L40 12 L60 22 L80 20 L100 30 L120 28 L140 38" stroke="#FF3B30" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="140" cy="38" r="3" fill="#FFFFFF" stroke="#FF3B30" stroke-width="2"/>
          </svg>
        </div>
      </div>

      <!-- 三指标（系统真实结构：圆形 icon + 文字 + 金额，按 income/expense/debt 上色） -->
      <div class="mt-5 grid grid-cols-3 gap-2.5">
        <!-- 收入（绿） -->
        <div class="flex flex-col gap-2 p-3 rounded-2xl bg-[var(--surface3)]">
          <div class="round-icon" style="background: var(--greenSoft); width: 32px; height: 32px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7 7 7-7" stroke="#16A36A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <p class="text-[11px] text-[var(--muted)]">收入</p>
            <p class="text-[15px] font-bold tabular text-[var(--greenDark)]">¥5,500</p>
          </div>
        </div>
        <!-- 支出（橙） -->
        <div class="flex flex-col gap-2 p-3 rounded-2xl bg-[var(--surface3)]">
          <div class="round-icon" style="background: var(--warmIconBg); width: 32px; height: 32px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="#FF9F1C" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <p class="text-[11px] text-[var(--muted)]">支出</p>
            <p class="text-[15px] font-bold tabular text-[var(--amber)]">¥12.6万</p>
          </div>
        </div>
        <!-- 欠款（蓝） -->
        <div class="flex flex-col gap-2 p-3 rounded-2xl bg-[var(--surface3)]">
          <div class="round-icon" style="background: var(--blueSoft); width: 32px; height: 32px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M16 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0zM4 21c0-4 4-6 8-6s8 2 8 6" stroke="#2F73F6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div>
            <p class="text-[11px] text-[var(--muted)]">欠款</p>
            <p class="text-[15px] font-bold tabular text-[var(--blue)]">¥430</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== AI 财务洞察卡（纯白底 + 蓝色 sparkle icon，对齐系统不使用渐变） ===== -->
  <section class="px-5 pt-4">
    <div class="section-card p-4">
      <div class="flex items-start gap-3">
        <div class="round-icon shrink-0" style="background: var(--blueSoft);">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <path d="M12 2l2.2 6.2L20 10l-5.8 1.8L12 18l-2.2-6.2L4 10l5.8-1.8L12 2z" fill="#2F73F6"/>
            <circle cx="19" cy="19" r="1.6" fill="#2F73F6" opacity="0.6"/>
          </svg>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between">
            <div class="flex items-baseline gap-1.5">
              <h3 class="text-[15px] font-bold text-[var(--ink)]">AI 财务洞察</h3>
              <span class="text-[11px] text-[var(--subtle)]">智能复盘</span>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#8B95A5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <p class="mt-1 text-[13px] leading-[20px] text-[var(--ink2)]">本年支出高于收入，优先复盘大额支出和未结人工。</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== 最近交易（单卡合并 + hairline 分隔 + 系统 lucide 语义图标） ===== -->
  <section class="px-5 pt-5">
    <div class="flex items-center justify-between mb-2.5">
      <h2 class="text-[16px] font-bold text-[var(--ink)]">最近交易</h2>
      <button class="flex items-center gap-1 text-[12px] font-medium text-[var(--blue)]">
        <span>查看全部</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="section-card px-4 py-1">
      <!-- Row 1: 工人工资 -->
      <div class="flex items-center gap-3 py-3 border-b border-[var(--lineSoft)]">
        <div class="round-icon shrink-0" style="background: var(--warmIconBg);">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M16 19v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 19v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="#FF9F1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[15px] font-semibold text-[var(--ink)]">工人工资</p>
          <p class="text-[12px] text-[var(--muted)] mt-0.5">2026-06-16 · 日常支出</p>
        </div>
        <span class="text-[15px] font-bold tabular text-[var(--red)]">-¥100</span>
      </div>
      <!-- Row 2: 人工 -->
      <div class="flex items-center gap-3 py-3 border-b border-[var(--lineSoft)]">
        <div class="round-icon shrink-0" style="background: var(--warmIconBg);">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="#FF9F1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[15px] font-semibold text-[var(--ink)]">人工</p>
          <p class="text-[12px] text-[var(--muted)] mt-0.5">2026-06-16 · 日常支出</p>
        </div>
        <span class="text-[15px] font-bold tabular text-[var(--red)]">-¥100</span>
      </div>
      <!-- Row 3: 工人工资 -->
      <div class="flex items-center gap-3 py-3">
        <div class="round-icon shrink-0" style="background: var(--warmIconBg);">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M16 19v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 19v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="#FF9F1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-[15px] font-semibold text-[var(--ink)]">工人工资</p>
          <p class="text-[12px] text-[var(--muted)] mt-0.5">2026-06-16 · 日常支出</p>
        </div>
        <span class="text-[15px] font-bold tabular text-[var(--red)]">-¥999</span>
      </div>
    </div>

    <!-- 待收款提醒（紧凑条，可选展示） -->
    <div class="mt-3 flex items-center gap-2.5 px-3 py-2.5 rounded-2xl border border-dashed border-[var(--amberSoft)] bg-[var(--amberSoft)]/40">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 9v4M12 17h.01M10.3 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="#FF9F1C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p class="flex-1 text-[12px] text-[var(--ink2)]"><span class="font-semibold">2 笔待收款</span>共 ¥430，预计本周内回款</p>
      <button class="text-[12px] font-semibold text-[var(--amber)]">查看</button>
    </div>
  </section>

  <!-- ===== 底部 tab bar ===== -->
  <nav class="absolute bottom-0 left-0 right-0 bg-white nav-shadow pt-2 pb-7 px-2">
    <div class="grid grid-cols-5">
      <!-- 首页 -->
      <button class="flex flex-col items-center gap-1 py-1 text-[var(--tabMuted)]">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-9z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span class="text-[11px] font-medium">首页</span>
      </button>
      <!-- 记录 -->
      <button class="flex flex-col items-center gap-1 py-1 text-[var(--tabMuted)]">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span class="text-[11px] font-medium">记录</span>
      </button>
      <!-- 芽芽 -->
      <button class="flex flex-col items-center gap-1 py-1 text-[var(--tabMuted)]">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 19c0-7 5-12 14-13-1 9-6 14-13 14M5 19c2-3 5-5 9-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="text-[11px] font-medium">芽芽</span>
      </button>
      <!-- 账本 (active) -->
      <button class="flex flex-col items-center gap-1 py-1 text-[var(--blue)]">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 3h11a2 2 0 0 1 2 2v15l-3-1.5L13 20l-3-1.5L7 20V5a2 2 0 0 1 2-2H6z"/></svg>
        <span class="text-[11px] font-semibold">账本</span>
      </button>
      <!-- 我的 -->
      <button class="flex flex-col items-center gap-1 py-1 text-[var(--tabMuted)]">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span class="text-[11px] font-medium">我的</span>
      </button>
    </div>
    <div class="mx-auto mt-1 w-[120px] h-[5px] rounded-full bg-[var(--ink)]"></div>
  </nav>
</div>

</body>
</html>
