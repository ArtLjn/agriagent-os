name: farm_manager_app
description: 田掌柜 Flutter mobile app.
publish_to: "none"
version: 1.2.7+13

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  lucide_icons_flutter: ^3.1.14+2
  flutter_secure_storage: ^10.3.1
  flutter_markdown: ^0.7.7+1
  geolocator: ^14.0.2
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/brand/
    - assets/images/business/
    - assets/images/record/
    - assets/images/yaya/
