      - 新增一个农资分类
      - 删除自定义分类包装费
      - 创建一个销售收入分类
    anti_examples:
      - 今天买了100元化肥
      - 这个月花了多少钱
      - 查询作物模板
      - 新增工人
      - 修改农事日志
    tags:
      - 分类
      - 账务分类
      - 成本分类
      - 收入分类
      - 支出分类
    version: v2
    owner: agent-platform
    status: active
    context_dependencies:
      - cost_categories
    cache_invalidation:
      - cost_analytics
      - cost_summary
      - get_farm_status
    operations:
      query_categories:
        risk: read
        description: 查询支出分类和收入分类。
        legacy_aliases:
          - get_cost_categories
      manage_category:
        risk: write_confirm
        description: 创建或删除农场账务分类。
        legacy_aliases:
          - manage_cost_categories
        cache_invalidation:
          - cost_analytics
          - cost_summary
          - get_farm_status
  - name: manage_crop_cycle
    domain: crop
    capability: crop_cycle_management
    description: 管理种植周期和茬口，支持创建、查询、修改阶段、调整日期和高风险删除。
    examples:
      - 帮我建个黑布林茬口30亩
      - 我的茬口有哪些
      - 看一下3号茬口
      - 西瓜进入膨大期了
      - 删除这个茬口
    anti_examples:
      - 创建作物模板
      - 查询棚和地块
      - 今天买了种子100元
      - 记录一次浇水
      - 查询工人工资
    tags:
      - 茬口
      - 种植周期
      - 阶段
      - 生长阶段
      - 播种
      - 采收
    version: v2
    owner: agent-platform
    status: active
    context_dependencies:
      - farm
      - active_cycles
      - crop_cycles
      - crop_templates
      - planting_units
    cache_invalidation:
      - crop_cycle
      - get_farm_status
    operations:
      create_cycle:
        risk: write_confirm
        description: 创建种植周期并生成阶段计划。
        legacy_aliases:
          - create_crop_cycle
        cache_invalidation:
          - crop_cycle
          - get_farm_status
      query_cycles:
        risk: read
        description: 查询茬口列表。
        legacy_aliases:
          - get_crop_cycles
      query_cycle_info:
        risk: read
        description: 查询单个茬口详情、阶段安排和进度。
        legacy_aliases:
          - get_crop_cycle_info
      update_cycle:
        risk: write_confirm
        description: 修改茬口开始日期、播种期或起始日期。
        legacy_aliases:
          - update_crop_cycle
        cache_invalidation:
          - crop_cycle
          - get_farm_status
      update_stage:
        risk: write_confirm
        description: 更新茬口当前生长阶段。
        legacy_aliases:
          - update_crop_stage
        cache_invalidation:
          - crop_cycle
          - get_farm_status
      delete_cycle:
        risk: write_high
        description: 删除茬口并级联删除相关阶段、日志、成本记录和种植单元。
        legacy_aliases:
          - delete_crop_cycle
        cache_invalidation:
          - crop_cycle
          - farm_logs
          - cost_analytics
          - cost_summary
          - get_farm_status
