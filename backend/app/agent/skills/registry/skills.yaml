    status: hidden
    disabled_reason: SearXNG 引擎不稳定（CAPTCHA/限流），暂禁用
    context_dependencies:
      - external_search
    operations:
      search:
        risk: external_network
        description: 搜索外部实时信息。
        legacy_aliases:
          - web_search
