capabilities:
  - name: manage_cost
    domain: finance
    capability: cost_management
    description: 管理农场账务，支持新增账单、查询收支、查看欠款、删除记录和结清赊账。
    examples:
      - 今天买了100元化肥
      - 这个月花了多少钱
      - 查一下我还欠老王多少钱
      - 删除昨天那笔支出
      - 把老王农资店的账结清
      - 这个月比上个月多花多少
      - 最近三个月成本趋势
    anti_examples:
      - 给老王补付300人工
      - 查询最近农事作业单
      - 新增一个工人
      - 西瓜进入膨大期
      - 修改天气城市
    tags:
      - 成本
      - 支出
      - 收入
      - 赊账
      - 还款
      - 欠款
      - 账单
      - 化肥
      - 趋势
      - 同比
      - 环比
      - 分析
    version: v2
    owner: agent-platform
    status: active
    context_dependencies:
      - farm
      - cost_records
      - cost_categories
    cache_invalidation:
      - cost_analytics
      - cost_summary
      - get_farm_status
    operations:
      create_record:
        risk: write_confirm
        description: 新增一笔支出、收入或赊账记录。
        legacy_aliases:
          - create_cost_record
        cache_invalidation:
          - cost_analytics
          - cost_summary
          - get_farm_status
      query_summary:
        risk: read
        description: 查询账单、收支、成本、收入、利润和流水明细。
        legacy_aliases:
          - get_cost_summary
      query_debt:
        risk: read
        description: 查询赊账和欠款统计。
        legacy_aliases:
          - get_debt_summary
      analyze_cost:
        risk: read
        description: 查询收支趋势、同比和环比分析。
        legacy_aliases:
          - get_cost_analytics
      delete_record:
        risk: write_high
        description: 删除或撤销一条账务记录。
        legacy_aliases:
          - delete_cost_record
        cache_invalidation:
          - cost_analytics
          - cost_summary
          - get_farm_status
      settle_debt:
        risk: write_confirm
        description: 部分还款或结清赊账。
        legacy_aliases:
          - settle_debt
        cache_invalidation:
          - cost_analytics
          - cost_summary
          - get_farm_status
  - name: manage_cost_categories
    domain: finance
    capability: manage_cost_categories
    description: 查询、创建或删除农场账务分类。
    examples:
