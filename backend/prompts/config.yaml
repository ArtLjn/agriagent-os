version: "1.0"
defaults:
  cost_parse: cost_parse
  report: report
  crop_template_parse: crop_template_parse
templates:
  cost_parse:
    file: cost_parse.j2
    description: "记账解析 prompt，注入当前日期"
  report:
    file: report.j2
    description: "报告生成 prompt"
  daily_advice:
    file: daily_advice.j2
    description: "每日农事建议生成 prompt，注入农场上下文"
  crop_template_parse:
    file: crop_template_parse.j2
    description: "作物模板解析 prompt，从自然语言描述提取结构化作物数据"
  cycle_parse:
    file: cycle_parse.j2
    description: "茬口解析 prompt，从自然语言描述提取结构化种植计划"
  worker_parse:
    file: worker_parse.j2
    description: "工人档案解析 prompt，从自然语言描述提取轻量用工档案"
compositions:
  system_base:
    snippets:
      - p1-language
      - p1-tool-guardrails
      - p1-parallel-tool
      - p2-role
      - p2-capability
      - p2-tool-guide
      - p3-format
      - p3-style
      - p4-context
    separator: "\n\n"
  system_chat:
    snippets:
      - p1-language
      - p1-no-tool-chat-guardrails
      - p2-role
      - p3-format
      - p3-style
      - p4-context
    separator: "\n\n"
  cost_parse:
    snippets:
      - p1-language
    template: cost_parse
    separator: "\n\n"
  crop_template_parse:
    snippets:
      - p1-language
    template: crop_template_parse
    separator: "\n\n"
  cycle_parse:
    snippets:
      - p1-language
    template: cycle_parse
    separator: "\n\n"
  worker_parse:
    snippets:
      - p1-language
    template: worker_parse
    separator: "\n\n"
  report:
    snippets:
      - p1-language
    template: report
    separator: "\n\n"
  daily_advice:
    snippets:
      - p1-language
    template: daily_advice
    separator: "\n\n"
